<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mark Entry — B. Ramlallah SSS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary:  #1a1a2e;
    --accent:   #4f8ef7;
    --success:  #27ae60;
    --danger:   #e74c3c;
    --bg:       #f4f6fb;
    --card:     #ffffff;
    --border:   #e0e4ef;
    --text:     #1a1a2e;
    --muted:    #7a7a9a;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    background: var(--bg);
    font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    color: var(--text);
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }

  #app { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Login Screen ── */
  #login-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 24px; text-align: center;
    background: var(--primary);
  }
  .login-logo   { font-size: 64px; margin-bottom: 20px; }
  .login-school { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .login-sub    { font-size: 15px; color: rgba(255,255,255,0.55); margin-bottom: 48px; line-height: 1.5; }
  .btn-google {
    display: flex; align-items: center; gap: 14px;
    background: #fff; border: none; border-radius: 14px;
    padding: 18px 32px; font-size: 18px; font-weight: 700;
    color: var(--text); cursor: pointer; width: 100%; max-width: 340px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    touch-action: manipulation; justify-content: center;
    transition: all 0.15s;
  }
  .btn-google:active { transform: scale(0.97); }
  .btn-google img { width: 28px; height: 28px; }
  .login-note { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 24px; }

  /* ── Top Bar ── */
  .topbar {
    background: var(--primary); color: #fff;
    padding: 20px 20px 14px; width: 100%;
    box-shadow: 0 2px 12px rgba(26,26,46,0.2);
  }
  .topbar-row    { display: flex; align-items: center; justify-content: space-between; }
  .topbar-title  { font-size: 22px; font-weight: 700; }
  .topbar-sub    { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .topbar-crumb  { font-size: 13px; color: var(--accent); margin-top: 6px; font-weight: 600; min-height: 18px; }
  .user-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3); object-fit: cover;
    cursor: pointer;
  }
  .user-initial {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; cursor: pointer; flex-shrink: 0;
  }

  /* ── Content ── */
  .content { flex: 1; padding: 24px 16px 100px; width: 100%; }

  .screen { display: none; }
  .screen.active { display: block; }

  .section-label {
    font-size: 12px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
  }

  /* ── Choice Cards ── */
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
  .choice-card {
    background: var(--card); border: 2.5px solid var(--border);
    border-radius: 20px; padding: 28px 16px; text-align: center;
    cursor: pointer; font-size: 32px; font-weight: 700; color: var(--text);
    box-shadow: 0 2px 12px rgba(26,26,46,0.08);
    touch-action: manipulation; user-select: none; transition: all 0.15s;
  }
  .choice-card .card-sub { font-size: 13px; font-weight: 500; opacity: 0.5; margin-top: 6px; }
  .choice-card:active { background: var(--primary); border-color: var(--primary); color: #fff; transform: scale(0.97); }

  /* ── Subject List ── */
  .subject-list { display: flex; flex-direction: column; gap: 10px; }
  .subject-item {
    background: var(--card); border: 2px solid var(--border); border-radius: 16px;
    padding: 20px 16px; display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; touch-action: manipulation;
    box-shadow: 0 2px 8px rgba(26,26,46,0.06); transition: all 0.15s;
  }
  .subject-item:active { background: #eef2ff; transform: scale(0.99); }
  .subject-name  { font-size: 18px; font-weight: 600; flex: 1; margin-right: 10px; }
  .subject-type  { font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 30px; white-space: nowrap; }
  .type-mark    { background: #e8f0fe; color: #1a56db; }
  .type-pib     { background: #fef3c7; color: #92400e; }
  .type-remarks { background: #f0fdf4; color: #166534; }

  /* ── Back Button ── */
  .btn-back {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--accent);
    font-size: 17px; font-weight: 600; cursor: pointer;
    padding: 0; margin-bottom: 22px; touch-action: manipulation;
  }

  /* ── Mark Header ── */
  .mark-header {
    background: var(--card); border-radius: 16px; padding: 18px;
    margin-bottom: 18px; border-left: 5px solid var(--accent);
    box-shadow: 0 2px 8px rgba(26,26,46,0.07);
  }
  .mark-header-title { font-size: 20px; font-weight: 700; }
  .mark-header-sub   { font-size: 14px; color: var(--muted); margin-top: 4px; }

  /* ── Student Rows ── */
  .student-list { display: flex; flex-direction: column; gap: 12px; }
  .student-row {
    background: var(--card); border-radius: 16px; padding: 16px;
    border: 1.5px solid var(--border); box-shadow: 0 2px 8px rgba(26,26,46,0.06);
  }
  .student-name {
    font-size: 16px; font-weight: 600; margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .student-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; min-width: 30px;
    background: var(--primary); color: #fff;
    border-radius: 50%; font-size: 13px; font-weight: 700;
  }

  /* ── Mark Input ── */
  .mark-input {
    width: 100%; height: 62px; border: 2.5px solid var(--border);
    border-radius: 12px; font-size: 28px; font-weight: 700;
    text-align: center; color: var(--text); background: var(--bg);
    outline: none; -webkit-appearance: none; appearance: none;
    touch-action: manipulation; transition: border-color 0.15s;
    font-family: inherit;
  }
  .mark-input:focus  { border-color: var(--accent); background: #fff; }
  .mark-input.filled { border-color: var(--success); background: #f0fdf4; }
  .mark-input.invalid{ border-color: var(--danger);  background: #fff5f5; }

  /* ── PIB Buttons ── */
  .pib-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .pib-btn {
    height: 58px; border: 2.5px solid var(--border); border-radius: 12px;
    font-size: 15px; font-weight: 700; background: var(--bg);
    cursor: pointer; touch-action: manipulation;
    -webkit-tap-highlight-color: transparent; transition: all 0.15s;
    font-family: inherit;
  }
  .pib-btn:active     { transform: scale(0.95); }
  .pib-btn.selected-p { background: #d4edda; border-color: #27ae60; color: #155724; }
  .pib-btn.selected-i { background: #fff3cd; border-color: #f0ad4e; color: #856404; }
  .pib-btn.selected-b { background: #f8d7da; border-color: #e74c3c; color: #721c24; }

  /* ── Remarks ── */
  .remarks-input {
    width: 100%; min-height: 90px; border: 2.5px solid var(--border);
    border-radius: 12px; font-size: 16px; padding: 12px 14px;
    color: var(--text); background: var(--bg); outline: none;
    resize: vertical; transition: border-color 0.15s; font-family: inherit;
  }
  .remarks-input:focus { border-color: var(--accent); background: #fff; }

  /* ── Submit ── */
  .submit-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--bg) 75%, transparent);
    padding: 16px 16px 24px;
  }
  .btn-submit {
    width: 100%; height: 64px; background: var(--primary); color: #fff;
    border: none; border-radius: 18px; font-size: 20px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 20px rgba(26,26,46,0.22);
    touch-action: manipulation; transition: all 0.15s; font-family: inherit;
  }
  .btn-submit:active   { transform: scale(0.98); opacity: 0.9; }
  .btn-submit:disabled { background: #b0b0c0; box-shadow: none; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--primary); color: #fff;
    padding: 14px 24px; border-radius: 50px;
    font-size: 15px; font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
  }
  .toast.show    { transform: translateX(-50%) translateY(0); }
  .toast.success { background: #1a7a4a; }
  .toast.error   { background: var(--danger); }

  /* ── Loading ── */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 0; gap: 16px;
    color: var(--muted); font-size: 16px; font-weight: 500;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Success ── */
  .success-screen { text-align: center; padding: 60px 24px; }
  .success-icon   { font-size: 72px; margin-bottom: 18px; }
  .success-title  { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
  .success-sub    { font-size: 16px; color: var(--muted); margin-bottom: 36px; line-height: 1.6; }
  .btn-again {
    width: 100%; height: 62px; background: var(--accent); color: #fff;
    border: none; border-radius: 18px; font-size: 18px; font-weight: 700;
    cursor: pointer; margin-bottom: 12px; touch-action: manipulation;
    font-family: inherit;
  }
  .btn-home {
    width: 100%; height: 62px; background: var(--card); color: var(--text);
    border: 2.5px solid var(--border); border-radius: 18px;
    font-size: 18px; font-weight: 700; cursor: pointer;
    touch-action: manipulation; font-family: inherit;
  }

  /* ── User menu ── */
  .user-menu {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 200; display: none;
    align-items: flex-end;
  }
  .user-menu.open { display: flex; }
  .user-menu-card {
    background: var(--card); width: 100%; border-radius: 24px 24px 0 0;
    padding: 32px 24px 40px;
  }
  .user-menu-name  { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .user-menu-email { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
  .btn-signout {
    width: 100%; height: 58px; background: #fff5f5; color: var(--danger);
    border: 2px solid #ffd0d0; border-radius: 14px;
    font-size: 17px; font-weight: 700; cursor: pointer;
    touch-action: manipulation; font-family: inherit;
  }
</style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-logo">🏫</div>
  <div class="login-school">B. Ramlallah State Secondary School</div>
  <div class="login-sub">Mark Entry System<br>Sign in with your school Google account</div>
  <button class="btn-google" onclick="signIn()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Sign in with Google
  </button>
  <div class="login-note">Only authorised school accounts can access this system</div>
</div>

<!-- ── Main App ── -->
<div id="main-app" style="display:none; flex-direction:column; min-height:100vh;">

  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="topbar-title">📝 Mark Entry</div>
        <div class="topbar-sub">B. Ramlallah State Secondary School</div>
      </div>
      <div class="user-initial" id="user-avatar" onclick="openUserMenu()">?</div>
    </div>
    <div class="topbar-crumb" id="breadcrumb">&nbsp;</div>
  </div>

  <div class="content">

    <!-- Screen 1: Grade -->
    <div class="screen active" id="screen-grade">
      <div class="section-label">Select Grade</div>
      <div class="choice-grid" id="grade-grid"></div>
    </div>

    <!-- Screen 2: Stream -->
    <div class="screen" id="screen-stream">
      <button class="btn-back" onclick="goTo('grade')">← Back</button>
      <div class="section-label">Select Class</div>
      <div class="choice-grid" id="stream-grid"></div>
    </div>

    <!-- Screen 3: Subject -->
    <div class="screen" id="screen-subject">
      <button class="btn-back" onclick="goTo('stream')">← Back</button>
      <div class="section-label">Select Subject</div>
      <div class="subject-list" id="subject-list"></div>
    </div>

    <!-- Screen 4: Marks -->
    <div class="screen" id="screen-marks">
      <button class="btn-back" onclick="goTo('subject')">← Back</button>
      <div class="mark-header">
        <div class="mark-header-title" id="marks-title"></div>
        <div class="mark-header-sub"   id="marks-sub"></div>
      </div>
      <div id="student-list-container"></div>
      <div style="height:90px"></div><!-- spacer for fixed button -->
    </div>

    <!-- Screen 5: Success -->
    <div class="screen" id="screen-success">
      <div class="success-screen">
        <div class="success-icon">✅</div>
        <div class="success-title">Marks Saved!</div>
        <div class="success-sub" id="success-sub"></div>
        <button class="btn-again" onclick="goTo('subject')">Enter Another Subject</button>
        <button class="btn-home"  onclick="goTo('grade')">Back to Home</button>
      </div>
    </div>

  </div>

  <!-- Fixed Submit Button -->
  <div class="submit-wrap" id="submit-wrap" style="display:none">
    <button class="btn-submit" id="btn-submit" onclick="submitMarks()">✓ Save Marks</button>
  </div>

</div>

<!-- User Menu -->
<div class="user-menu" id="user-menu" onclick="closeUserMenu()">
  <div class="user-menu-card" onclick="event.stopPropagation()">
    <div class="user-menu-name"  id="menu-name"></div>
    <div class="user-menu-email" id="menu-email"></div>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// ── Config ───────────────────────────────────────────────────
var CLIENT_ID   = '920543301524-69idp58am0pr3fnqf4etlghehirakp17.apps.googleusercontent.com';

var SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbxHzWuSWKWe375FxrWiqvZ74xavutbvWXHBZD9jZ7xwNHcGN-tD51OAQBasKjC_tFOnaA/exec';

// Only identity scopes — no spreadsheet access requested from the user
var SCOPES      = 'openid email profile';
var accessToken = null;

var SPREADSHEET_G7G8 = '1xZWPBK2CD0KwT2JAJubl5J7skHO3rZDX8F8Cs5_o4Dw';
var SPREADSHEET_G9   = '1-4pkmA_7B1dVgK_nF9sXB5Ch00EPRA97NWk2hx1APn8';
var SPREADSHEET_G10  = '1KsG0JMB8dMUAuicCvmZEgvEAOk9mJxB0zmztKel6-eY';
var SPREADSHEET_G11  = '1oeo_uWZBFyftgAP74u6udvCku9znk94lNVQxKVjy4RA';
var SPREADSHEET_G12  = '1OGS-G-_36AHAJx8xC8O3dtV9NzP1rhyZUJ9jYWRzf9Y';

var GRADE_CONFIG = {
  'G7': {

    classes: [
      { label: 'Red', tab: 'G7 Red' },
      { label: 'Blue', tab: 'G7 Blue' },

    classes: [

    ]
  },
  'G9': {
    spreadsheetId: SPREADSHEET_G9,
    classes: [
      { label: 'Red', tab: 'G9 Red' },

  },
  'G10': {

    classes: [
      { label: 'ART', tab: 'G10 ART' },
      { label: 'Eco1', tab: 'G10 Eco1' },

    ]
  },

};

var SUBJECTS = [
  { name: 'English',                 code: 'SUBJ15', type: 'mark' },

  { name: 'BEE',                     code: 'SUBJ7',  type: 'mark' },

  { name: 'ICT',                     code: 'SUBJ25', type: 'mark' },
  { name: 'Kreol Morisien',          code: 'SUBJ27', type: 'mark' },
  { name: 'Social & Modern Studies', code: 'SUBJ40', type: 'mark' },
  { name: 'Telugu',                  code: 'SUBJ44', type: 'mark' },
  { name: 'Urdu',                    code: 'SUBJ46', type: 'mark' },
  { name: 'Tamil',                   code: 'SUBJ42', type: 'mark' },
  { name: 'Life Skills & Values',    code: 'SUBJ28', type: 'pib'  },
  { name: 'Performing Arts',         code: 'SUBJ35', type: 'pib'  },
  { name: 'Physical Education',      code: 'SUBJ36', type: 'pib'  },
  { name: 'Form Master Remarks',     code: 'REMARKS',type: 'remarks' },
];

// ── State ────────────────────────────────────────────────────
var state = {
  grade: null,
  classLabel: null,
  tabName: null,
  spreadsheetId: null,
  subject: null,
  students: [],
  sheetData: null
};
var tokenClient;

// ── Auth ─────────────────────────────────────────────────────
window.onload = function() {
  // Check if already signed in
  var saved = sessionStorage.getItem('userInfo');
  if (saved && sessionStorage.getItem('accessToken')) {
    accessToken = sessionStorage.getItem('accessToken');
    showApp(JSON.parse(saved));
  }
};

function signIn() {
  if (!SCRIPT_URL) {
    showToast('SCRIPT_URL not configured — see google-apps-script.gs', 'error');
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: function(response) {
      if (response.error) { showToast('Sign in failed', 'error'); return; }
      accessToken = response.access_token;
      sessionStorage.setItem('accessToken', accessToken);
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { 'Authorization': 'Bearer ' + accessToken }
      })
      .then(function(r){ return r.json(); })
      .then(function(user) {
        sessionStorage.setItem('userInfo', JSON.stringify(user));
        showApp(user);
      });
    }
  });
  tokenClient.requestAccessToken();
}

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';

  // Set avatar
  var av = document.getElementById('user-avatar');
  var initial = (user.name || user.email || '?')[0].toUpperCase();
  av.textContent = initial;

  // Set menu
  document.getElementById('menu-name').textContent  = user.name  || '';
  document.getElementById('menu-email').textContent = user.email || '';

  renderGrades();
}

function signOut() {
  sessionStorage.clear();
  accessToken = null;
  closeUserMenu();
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function openUserMenu()  { document.getElementById('user-menu').classList.add('open'); }
function closeUserMenu() { document.getElementById('user-menu').classList.remove('open'); }

// ── Navigation ────────────────────────────────────────────────
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-' + screen).classList.add('active');
  document.getElementById('submit-wrap').style.display = screen === 'marks' ? 'block' : 'none';
  window.scrollTo(0, 0);
  updateBreadcrumb();
}

function updateBreadcrumb() {
  var crumb = '';
  if (state.grade)      crumb += state.grade;
  if (state.classLabel) crumb += ' › ' + state.classLabel;
  if (state.subject)    crumb += ' › ' + state.subject.name;
  document.getElementById('breadcrumb').textContent = crumb || '\u00a0';
}

function classDisplayName() {
  if (!state.grade || !state.classLabel) return '';
  return state.grade + ' ' + state.classLabel;
}

// ── Screen 1: Grades ──────────────────────────────────────────
function renderGrades() {
  var grid = document.getElementById('grade-grid');
  grid.innerHTML = '';
  Object.keys(GRADE_CONFIG).forEach(function(g) {
    var card = document.createElement('div');
    card.className = 'choice-card';
    card.innerHTML = g + '<div class="card-sub">Grade ' + g.replace('G','') + '</div>';
    card.onclick = function(){ selectGrade(g); };
    grid.appendChild(card);
  });
}

function selectGrade(grade) {
  state.grade = grade;
  state.classLabel = null;
  state.tabName = null;
  state.spreadsheetId = null;
  state.subject = null;
  updateBreadcrumb();
  renderClasses();
  goTo('stream');
}

// ── Screen 2: Classes ─────────────────────────────────────────
function renderClasses() {
  var grid = document.getElementById('stream-grid');
  grid.innerHTML = '';
  var colors = { Red:'#e74c3c', Blue:'#3498db', Yellow:'#f39c12' };
  GRADE_CONFIG[state.grade].classes.forEach(function(cls) {
    var card = document.createElement('div');
    card.className = 'choice-card';
    card.style.borderColor = colors[cls.label] || '#ccc';
    card.textContent = cls.label;
    card.onclick = function(){ selectClass(cls); };
    grid.appendChild(card);
  });
}

function selectClass(cls) {
  var gradeCfg = GRADE_CONFIG[state.grade];
  state.classLabel = cls.label;
  state.tabName = cls.tab;
  state.spreadsheetId = gradeCfg.spreadsheetId;
  state.subject = null;
  updateBreadcrumb();
  renderSubjects();
  goTo('subject');
}

// ── Screen 3: Subjects ────────────────────────────────────────
function renderSubjects() {
  var list = document.getElementById('subject-list');
  list.innerHTML = '';
  SUBJECTS.forEach(function(subj) {
    var item = document.createElement('div');
    item.className = 'subject-item';
    var typeLabel = subj.type==='mark' ? 'Mark' : subj.type==='pib' ? 'P / I / B' : 'Remarks';
    item.innerHTML =
      '<span class="subject-name">' + subj.name + '</span>' +
      '<span class="subject-type type-' + subj.type + '">' + typeLabel + '</span>';
    item.onclick = function(){ selectSubject(subj); };
    list.appendChild(item);
  });
}

function selectSubject(subj) {
  state.subject = subj; updateBreadcrumb(); loadMarks(); goTo('marks');
}

// ── Screen 4: Load Marks ──────────────────────────────────────
function loadMarks() {
  var container = document.getElementById('student-list-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading students...</div>';
  document.getElementById('marks-title').textContent = state.subject.name;
  document.getElementById('marks-sub').textContent   = classDisplayName();
  document.getElementById('btn-submit').disabled = true;

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'read',
      token: accessToken,
      spreadsheetId: state.spreadsheetId,
      tab: state.tabName
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.error) { showToast('Error: ' + data.error, 'error'); return; }
    parseAndRender(data.values || []);
  })
  .catch(function(){ showToast('Failed to load. Check connection.', 'error'); });
}

function parseAndRender(rows) {
  if (rows.length < 3) { showToast('Sheet data not found', 'error'); return; }

  var codeRow  = rows[2]; // Row 3 = codes
  var subjColMap = {};
  codeRow.forEach(function(code, i){ if(code) subjColMap[code] = i; });

  var nameCol = subjColMap['NAME'];
  var subjCol = subjColMap[state.subject.code];

  var students = [];
  for (var i = 3; i < rows.length; i++) {
    var name = (rows[i][nameCol] || '').toString().trim();
    if (!name) continue;
    var existing = subjCol !== undefined ? (rows[i][subjCol] || '') : '';
    students.push({ name: name, rowIndex: i, existing: existing.toString() });
  }

  state.students   = students;
  state.sheetData  = { codeRow: codeRow, subjCol: subjCol };

  document.getElementById('marks-sub').textContent =
    classDisplayName() + ' · ' + students.length + ' students';

  renderStudentRows(students);
  document.getElementById('btn-submit').disabled = false;
}

function renderStudentRows(students) {
  var container = document.getElementById('student-list-container');
  container.innerHTML = '';
  var list = document.createElement('div');
  list.className = 'student-list';

  students.forEach(function(student, idx) {
    var existing = student.existing || '';
    var row = document.createElement('div');
    row.className = 'student-row';

    var inputHtml = '';
    if (state.subject.type === 'mark') {
      inputHtml = '<input class="mark-input ' + (existing ? 'filled' : '') + '"' +
        ' type="number" inputmode="numeric" min="0" max="100"' +
        ' placeholder="—" value="' + existing + '"' +
        ' oninput="onMarkInput(this)">';
    } else if (state.subject.type === 'pib') {
      var selP = existing==='P' ? 'selected-p' : '';
      var selI = existing==='I' ? 'selected-i' : '';
      var selB = existing==='B' ? 'selected-b' : '';
      inputHtml = '<div class="pib-buttons">' +
        '<button class="pib-btn ' + selP + '" data-val="P" onclick="selectPIB(this)">Proficient</button>' +
        '<button class="pib-btn ' + selI + '" data-val="I" onclick="selectPIB(this)">Intermediate</button>' +
        '<button class="pib-btn ' + selB + '" data-val="B" onclick="selectPIB(this)">Basic</button>' +
        '</div>';
    } else {
      inputHtml = '<textarea class="remarks-input" placeholder="Enter remarks...">' + existing + '</textarea>';
    }

    row.innerHTML =
      '<div class="student-name"><span class="student-num">' + (idx+1) + '</span>' + student.name + '</div>' +
      inputHtml;
    list.appendChild(row);
  });
  container.appendChild(list);
}

function onMarkInput(input) {
  var val = parseInt(input.value);
  input.classList.remove('filled','invalid');
  if (input.value === '') return;
  if (isNaN(val) || val < 0 || val > 100) input.classList.add('invalid');
  else input.classList.add('filled');
}

function selectPIB(btn) {
  var group = btn.parentElement;
  group.querySelectorAll('.pib-btn').forEach(function(b){
    b.classList.remove('selected-p','selected-i','selected-b');
  });
  btn.classList.add('selected-' + btn.dataset.val.toLowerCase());
}

// ── Submit ────────────────────────────────────────────────────
function submitMarks() {
  var btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Saving...';

  var subj    = state.subject;
  var subjCol = state.sheetData.subjCol; // 0-indexed → Apps Script needs 1-indexed
  var col1    = subjCol + 1;
  var updates = [];
  if (subj.type === 'mark') {
    document.querySelectorAll('.mark-input').forEach(function(input, i) {
      var raw = input.value.trim();
      updates.push({ row: state.students[i].rowIndex + 1, col: col1,
                     value: raw === '' ? '' : parseInt(raw) });
    });
  } else if (subj.type === 'pib') {
    document.querySelectorAll('.pib-buttons').forEach(function(group, i) {
      var sel = group.querySelector('[class*="selected-"]');
      updates.push({ row: state.students[i].rowIndex + 1, col: col1,
                     value: sel ? sel.dataset.val : '' });
    });
  } else {
    document.querySelectorAll('.remarks-input').forEach(function(ta, i) {
      updates.push({ row: state.students[i].rowIndex + 1, col: col1,
                     value: ta.value.trim() });
    });
  }

  fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'write',
      token: accessToken,
      spreadsheetId: state.spreadsheetId,
      tab: state.tabName,
      updates: updates
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(result) {
    btn.disabled = false; btn.textContent = '✓ Save Marks';
    if (result.error) { showToast('Error: ' + result.error, 'error'); return; }
    document.getElementById('success-sub').textContent =
      subj.name + ' marks for ' + classDisplayName() + ' saved successfully.';
    goTo('success');
  })
  .catch(function(){
    btn.disabled = false; btn.textContent = '✓ Save Marks';
    showToast('Failed to save. Try again.', 'error');
  });
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(msg, type) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + (type||'');
  setTimeout(function(){ toast.className = 'toast'; }, 3000);
}
</script>
</body>
</html>
